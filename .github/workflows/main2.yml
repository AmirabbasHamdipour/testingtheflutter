name: Flutter Android Build + Push APK to Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # ✅ کش کردن پکیج‌های pub (مهمترین بخش)
      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-

      - name: Check if Flutter project exists
        id: check_project
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create new Flutter project
        if: steps.check_project.outputs.exists == 'false'
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          PROJECT_NAME=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | sed 's/^[0-9]/_/')
          [ -z "$PROJECT_NAME" ] && PROJECT_NAME="my_flutter_app"
          flutter create --org com.example.app --project-name "$PROJECT_NAME" .

      - name: Commit and push new Flutter project
        if: steps.check_project.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🚀 Initialize Flutter project via GitHub Actions"
          git push

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons (if configured)
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            dart run flutter_launcher_icons
          else
            echo "flutter_launcher_icons not found, skipping."
          fi

      - name: Run build_runner (if configured)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner not found, skipping."
          fi

      # ✅ کش کردن build outputs برای دفعات بعد (اختیاری اما مفید)
      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Prepare APK directory
        run: |
          mkdir -p apk
          rm -f apk/*.apk

      - name: Copy APKs to repository folder
        run: cp build/app/outputs/flutter-apk/*.apk apk/

      - name: Commit and push APKs to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f apk/*.apk
          git commit -m "📦 Update APK builds [skip ci]" || echo "No changes to commit"
          git push